services:
  frontend:
    build: ./frontend
    ports:
      - "3001:3000" # Maps Host 3001 to Container 3000
    restart: always

  backend:
    build: ./backend
    ports:
      - "3000:3000" # Maps Host 3000 to Container 3000
    restart: always
    deploy:
      replicas: 3
    env_file:
      - .env
  
